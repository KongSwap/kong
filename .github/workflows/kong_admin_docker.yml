name: Build and Push Kong Admin Docker Image

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'src/kong_admin/**'
      - 'src/kong_lib/**'
      - '.github/workflows/kong_admin_docker.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag (leave empty for auto-generated)'
        required: false
        default: ''

env:
  REGISTRY: registry.digitalocean.com/kongswap-container-registry
  IMAGE_NAME: kong_admin

jobs:
  build-chisel-base:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DIGITALOCEAN_TOKEN }}
          password: ${{ secrets.DIGITALOCEAN_TOKEN }}

      - name: Build and push chisel_ubuntu base image
        uses: docker/build-push-action@v5
        with:
          context: ./src/kong_admin
          file: ./src/kong_admin/Dockerfile.chisel_ubuntu
          push: true
          tags: ${{ env.REGISTRY }}/chisel_ubuntu:latest
          cache-from: type=gha,scope=chisel
          cache-to: type=gha,mode=max,scope=chisel
          platforms: linux/amd64

  build-and-push:
    runs-on: ubuntu-latest
    needs: build-chisel-base

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DIGITALOCEAN_TOKEN }}
          password: ${{ secrets.DIGITALOCEAN_TOKEN }}

      - name: Generate image tags
        id: tags
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          TAG_VERSION="${TIMESTAMP}-${SHORT_SHA}"

          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG_VERSION="${{ github.event.inputs.tag }}"
          fi

          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_OUTPUT
          echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG_VERSION}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "version=${TAG_VERSION}" >> $GITHUB_OUTPUT

      - name: Update Dockerfile to use DO registry base image
        run: |
          sed -i 's|FROM chisel_ubuntu:latest|FROM ${{ env.REGISTRY }}/chisel_ubuntu:latest|g' src/kong_admin/Dockerfile.kong_admin

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./src
          file: ./src/kong_admin/Dockerfile.kong_admin
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=kong-admin
          cache-to: type=gha,mode=max,scope=kong-admin
          platforms: linux/amd64

      - name: Output image tags
        run: |
          echo "### Docker Image Published! 🐳" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** DigitalOcean Container Registry (NYC3)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Images:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pull command:**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
